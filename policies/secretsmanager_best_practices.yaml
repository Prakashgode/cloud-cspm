policies:
  - id: SECRETS-1
    name: "Secrets Manager Rotation Enabled"
    description: "Ensure Secrets Manager secrets have automatic rotation enabled"
    severity: MEDIUM
    scanner: secrets
    check: rotation_enabled

  - id: SECRETS-2
    name: "Secrets Manager Recent Rotation"
    description: "Ensure Secrets Manager secrets rotate at least every 90 days"
    severity: MEDIUM
    scanner: secrets
    check: recent_rotation

  - id: SECRETS-3
    name: "Secrets Manager Recent Access"
    description: "Ensure unused Secrets Manager secrets are removed or reviewed within 90 days"
    severity: MEDIUM
    scanner: secrets
    check: recent_access

  - id: SECRETS-4
    name: "Secrets Manager Tags"
    description: "Ensure Secrets Manager secrets have user-defined tags"
    severity: LOW
    scanner: secrets
    check: tags_present
